<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>envcrypted ‚ÄĒ Terminal Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #080c0a;
      --bg2: #0d1210;
      --bg3: #111a14;
      --green: #00ff88;
      --green2: #00cc6a;
      --green3: #004d29;
      --cyan: #00ffd5;
      --red: #ff4757;
      --yellow: #ffd32a;
      --text: #c8d8c8;
      --text2: #6a8a6a;
      --border: #1a2e1a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'JetBrains Mono', monospace;
      padding: 40px 20px;
    }

    /* Scanlines */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    .demo-wrapper {
      width: 100%;
      max-width: 860px;
    }

    .demo-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .demo-header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 42px;
      font-weight: 800;
      letter-spacing: -2px;
      color: var(--text);
      margin-bottom: 8px;
    }

    .demo-header h1 span { color: var(--green); }

    .demo-header p {
      font-size: 13px;
      color: var(--text2);
      font-weight: 300;
    }

    /* Tab bar */
    .tab-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 0;
      padding: 0 4px;
    }

    .tab {
      padding: 10px 20px;
      font-size: 12px;
      color: var(--text2);
      border-radius: 6px 6px 0 0;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
      border-bottom: none;
      letter-spacing: 0.5px;
      background: var(--bg3);
    }

    .tab:hover { color: var(--text); }

    .tab.active {
      color: var(--green);
      border-color: var(--border);
      background: #0a0f0a;
      border-bottom: 1px solid #0a0f0a;
      position: relative;
      z-index: 2;
    }

    /* Terminal */
    .terminal {
      background: #0a0f0a;
      border: 1px solid var(--border);
      border-radius: 0 8px 8px 8px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(0,255,136,0.06), 0 32px 64px rgba(0,0,0,0.4);
    }

    .terminal-header {
      padding: 12px 16px;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot.r { background: #ff5f57; }
    .dot.y { background: #ffbd2e; }
    .dot.g { background: #28c840; }

    .terminal-path {
      margin-left: 12px;
      font-size: 12px;
      color: var(--text2);
      letter-spacing: 0.3px;
    }

    .terminal-path .path-green { color: var(--green); }

    .terminal-body {
      padding: 28px 32px;
      min-height: 420px;
      font-size: 13.5px;
      line-height: 1.75;
      position: relative;
    }

    .line { display: flex; align-items: flex-start; gap: 0; margin-bottom: 2px; }
    .line.gap { margin-top: 12px; }

    .prompt-sym { color: var(--green); margin-right: 10px; user-select: none; flex-shrink: 0; }
    .cmd { color: #ffffff; }
    .cmd-key { color: var(--green); }
    .cmd-flag { color: var(--cyan); }
    .out-dim { color: var(--text2); }
    .out-green { color: var(--green); }
    .out-cyan { color: var(--cyan); }
    .out-yellow { color: var(--yellow); }
    .out-red { color: var(--red); }
    .out-white { color: #ffffff; }
    .out-bold { font-weight: 700; }

    .cursor-blink {
      display: inline-block;
      width: 8px;
      height: 15px;
      background: var(--green);
      animation: blink 1s step-end infinite;
      vertical-align: middle;
      margin-left: 2px;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .indent { padding-left: 20px; }
    .indent2 { padding-left: 36px; }

    /* Progress bar */
    .progress-bar {
      width: 100%;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin: 16px 0 8px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--green);
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s ease;
      box-shadow: 0 0 8px var(--green);
    }

    /* Auto-play controls */
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: var(--bg3);
    }

    .control-btns { display: flex; gap: 8px; }

    .ctrl-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text2);
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.2s;
    }

    .ctrl-btn:hover { color: var(--green); border-color: var(--green3); }
    .ctrl-btn.active { color: var(--green); border-color: var(--green3); background: var(--green3); }

    .speed-label { font-size: 11px; color: var(--text2); letter-spacing: 0.5px; }

    /* Step indicators */
    .step-indicators {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 24px;
    }

    .step-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: all 0.3s;
      cursor: pointer;
    }

    .step-dot.active {
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
    }

    .step-dot.done { background: var(--green3); }

    /* Step labels */
    .step-labels {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-top: 12px;
    }

    .step-label-item {
      font-size: 11px;
      color: var(--text2);
      text-align: center;
      transition: color 0.3s;
      cursor: pointer;
      letter-spacing: 0.3px;
    }

    .step-label-item.active { color: var(--green); }
    .step-label-item.done { color: var(--text2); }

    /* Embed note */
    .embed-note {
      margin-top: 32px;
      text-align: center;
      font-size: 11px;
      color: var(--text2);
      letter-spacing: 0.3px;
    }

    .embed-note code {
      background: var(--bg3);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 3px;
      color: var(--green);
      font-size: 11px;
    }
  </style>
</head>

  ];

  let currentStep = 0;
  let currentLineIdx = 0;
  let isPlaying = true;
  let timer = null;
  const termBody = document.getElementById('termBody');

  function renderLine(line) {
    const div = document.createElement('div');
    div.className = 'line';
    if (line.type === 'blank') {
      div.innerHTML = '&nbsp;';
      div.style.lineHeight = '0.5';
      termBody.appendChild(div);
      return;
    }
    if (line.type === 'cmd') {
      div.innerHTML = `<span class="prompt-sym">$</span><span class="cmd">${line.text}</span>`;
    } else {
      if (line.extra) {
        div.innerHTML = `<span class="${line.cls}">${line.text}</span><span class="${line.extra.cls}">${line.extra.text}</span>`;
      } else {
        div.innerHTML = `<span class="${line.cls}">${line.text}</span>`;
      }
      div.className = 'line indent';
    }
    termBody.appendChild(div);
    termBody.scrollTop = termBody.scrollHeight;
  }

  function addCursor() {
    removeCursor();
    const cur = document.createElement('span');
    cur.className = 'cursor-blink';
    cur.id = 'activeCursor';
    termBody.appendChild(cur);
  }

  function removeCursor() {
    const old = document.getElementById('activeCursor');
    if (old) old.remove();
  }

  function updateTabs() {
    const tabs = document.querySelectorAll('.tab');
    tabs.forEach((t, i) => t.classList.toggle('active', i === currentStep));
  }

  function updateDots() {
    const dots = document.querySelectorAll('.step-dot');
    const labels = document.querySelectorAll('.step-label-item');
    dots.forEach((d, i) => {
      d.classList.remove('active', 'done');
      if (i === currentStep) d.classList.add('active');
      else if (i < currentStep) d.classList.add('done');
    });
    labels.forEach((l, i) => {
      l.classList.remove('active', 'done');
      if (i === currentStep) l.classList.add('active');
    });
  }

  function updateStepLabel() {
    document.getElementById('stepLabel').textContent =
      `Step ${currentStep + 1} of 4 ‚ÄĒ ${STEPS[currentStep].label}`;
  }

  function playNextLine() {
    if (!isPlaying) return;
    const step = STEPS[currentStep];

    if (currentLineIdx >= step.lines.length) {
      // Step complete ‚ÄĒ move to next after pause
      removeCursor();
      if (currentStep < STEPS.length - 1) {
        timer = setTimeout(() => {
          currentStep++;
          currentLineIdx = 0;
          termBody.innerHTML = '';
          updateTabs();
          updateDots();
          updateStepLabel();
          addCursor();
          playNextLine();
        }, 2200);
      } else {
        // All done ‚ÄĒ restart after pause
        timer = setTimeout(() => restartDemo(), 3000);
      }
      return;
    }

    const line = step.lines[currentLineIdx];
    removeCursor();
    renderLine(line);
    addCursor();
    currentLineIdx++;

    timer = setTimeout(playNextLine, line.delay + 180);
  }

  function togglePlay() {
    isPlaying = !isPlaying;
    const btn = document.getElementById('playBtn');
    if (isPlaying) {
      btn.textContent = '‚Źł PAUSE';
      btn.classList.add('active');
      playNextLine();
    } else {
      btn.textContent = '‚Ė∂ PLAY';
      btn.classList.remove('active');
      clearTimeout(timer);
    }
  }

  function restartDemo() {
    clearTimeout(timer);
    currentStep = 0;
    currentLineIdx = 0;
    termBody.innerHTML = '';
    isPlaying = true;
    document.getElementById('playBtn').textContent = '‚Źł PAUSE';
    document.getElementById('playBtn').classList.add('active');
    updateTabs();
    updateDots();
    updateStepLabel();
    addCursor();
    playNextLine();
  }

  function jumpToStep(idx) {
    clearTimeout(timer);
    currentStep = idx;
    currentLineIdx = 0;
    termBody.innerHTML = '';
    isPlaying = true;
    document.getElementById('playBtn').textContent = '‚Źł PAUSE';
    document.getElementById('playBtn').classList.add('active');
    updateTabs();
    updateDots();
    updateStepLabel();
    addCursor();
    playNextLine();
  }

  // Start
  addCursor();
  playNextLine();
</script>
